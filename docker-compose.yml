version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastcook_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - CORS_ORIGIN=http://localhost:5173
      - REDIS_URL=redis://redis:6379
    networks:
      - fastcook_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:alpine
    container_name: fastcook_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - fastcook_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # No Docker Compose mais recente, args podem absorver vars não declaradas se existirem no root .env ou no cli
      # Para builds que requerem ficheiros .env, é mais robusto passar no run point ou usar docker secrets
    container_name: fastcook_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - fastcook_net
    depends_on:
      backend:
        condition: service_healthy

networks:
  fastcook_net:
    driver: bridge
