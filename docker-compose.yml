version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flashcook_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - CORS_ORIGIN=http://localhost:5173
    networks:
      - flashcook_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # No Docker Compose mais recente, args podem absorver vars não declaradas se existirem no root .env ou no cli
      # Para builds que requerem ficheiros .env, é mais robusto passar no run point ou usar docker secrets
    container_name: flashcook_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - flashcook_net
    depends_on:
      backend:
        condition: service_healthy

networks:
  flashcook_net:
    driver: bridge
