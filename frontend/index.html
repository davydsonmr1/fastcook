<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="FlashCook — Dite os seus ingredientes e receba receitas instantâneas geradas por IA." />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <title>FlashCook</title>
  </head>
  <body>
    <!-- Capturador de Crash Oculto -->
    <script>
      window.addEventListener('error', function(event) {
        document.body.innerHTML += '<div style="color:red;z-index:9999;position:fixed;top:0;left:0;background:white;padding:20px;border-bottom:1px solid red;width:100%;">' + 
        '<b>Erro Fatal JS:</b> ' + event.message + '<br/><small>' + event.filename + ':' + event.lineno + '</small></div>';
      });
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML += '<div style="color:red;z-index:9999;position:fixed;top:0;left:0;background:white;padding:20px;border-bottom:1px solid red;width:100%;">' + 
        '<b>Promise Rejeitada (Crash):</b> ' + (event.reason && event.reason.message ? event.reason.message : String(event.reason)) + '</div>';
      });
    </script>

</html>
